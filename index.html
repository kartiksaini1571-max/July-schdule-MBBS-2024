<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Teaching Schedule – 2nd Prof MBBS | AIIMS Patna</title>
<style>
  :root{
    --bg:#0a0e1a; --bg-elev:#12182a; --card:#161d33; --border:#263255;
    --text:#e7ebf5; --muted:#8a93b3; --accent:#4f8ef7; --green:#22c55e; --amber:#f59e0b;
  }
  html[data-theme="light"]{
    --bg:#f1f4fa; --bg-elev:#ffffff; --card:#ffffff; --border:#dbe1ef;
    --text:#16203a; --muted:#5b6479; --accent:#3b6fd8; --green:#16a34a; --amber:#d97706;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:90px; transition:background .2s,color .2s;
  }
  a{color:inherit;}

  header{
    position:sticky; top:0; z-index:50; background:var(--bg-elev);
    border-bottom:1px solid var(--border); padding:12px 16px;
  }
  .header-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .header-titles h1{font-size:1.05rem; margin:0 0 2px; font-weight:700; letter-spacing:.2px;}
  .header-titles p{font-size:.75rem; margin:0; color:var(--muted);}
  .header-actions{display:flex; gap:8px; flex-shrink:0;}
  .icon-btn{
    background:var(--card); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:7px 10px; font-size:.9rem; cursor:pointer; line-height:1;
  }
  .icon-btn:active{transform:scale(.95);}

  /* MONTH TABS */
  .month-tabs{display:flex; gap:6px; margin-top:12px;}
  .month-tab{
    flex:1; text-align:center; padding:8px 0; border-radius:9px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); font-size:.8rem; font-weight:700; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .month-tab.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .month-tab:active{ transform:scale(.97); }

  #legend{display:flex; flex-wrap:wrap; gap:8px 12px; margin-top:10px;}
  .legend-item{display:flex; align-items:center; gap:4px; font-size:.68rem; color:var(--muted);}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0;}

  .batch-row{display:flex; gap:6px; margin-top:10px;}
  .batch-btn, .batch-btn-modal{
    flex:1; text-align:center; padding:7px 0; border-radius:9px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); font-size:.8rem; font-weight:600; cursor:pointer;
  }
  .batch-btn.active, .batch-btn-modal.active{
    background:var(--accent); color:#fff; border-color:var(--accent);
  }

  #banner{
    margin:10px 16px 0; padding:10px 12px; background:rgba(245,158,11,.12);
    border-left:3px solid var(--amber); border-radius:8px; font-size:.72rem; line-height:1.5;
  }
  #banner strong{display:block; margin-bottom:4px; font-size:.75rem;}
  #banner ul{margin:0; padding-left:16px;}

  main{padding:14px 16px;}

  .day-card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    margin-bottom:10px; overflow:hidden;
  }
  .day-card.is-today{border-color:var(--accent);}
  .day-card.today-flash{box-shadow:0 0 0 3px var(--accent);}

  .day-header{
    display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer;
  }
  .day-date{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .day-num{font-size:1.25rem; font-weight:800; min-width:26px;}
  .day-meta{display:flex; flex-direction:column; line-height:1.2;}
  .day-name{font-size:.72rem; font-weight:600;}
  .day-month{font-size:.62rem; color:var(--muted);}
  .day-pills{display:flex; flex-wrap:wrap; gap:4px; flex:1; min-width:0;}
  .pill{
    display:flex; align-items:center; gap:3px; font-size:.62rem; padding:2px 6px;
    background:var(--bg-elev); border:1px solid var(--border); border-radius:999px; color:var(--muted);
    white-space:nowrap;
  }
  .day-right{display:flex; align-items:center; gap:6px; flex-shrink:0;}
  .day-progress{font-size:.65rem; color:var(--muted); background:var(--bg-elev); border:1px solid var(--border); padding:2px 6px; border-radius:999px;}
  .chevron{font-size:.7rem; color:var(--muted); transition:transform .2s;}
  .day-header.expanded .chevron{transform:rotate(180deg);}

  .day-body{display:none; padding:0 12px 12px;}
  .day-body.open{display:block;}

  .item, .batch-block{
    background:var(--bg-elev); border-left:4px solid var(--accent); border-radius:9px;
    padding:10px 12px; margin-top:8px; display:flex; flex-direction:column; gap:3px;
  }
  .item-top{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .item-time{font-size:.66rem; color:var(--muted); font-weight:600;}
  .batch-chip{font-size:.6rem; background:var(--accent); color:#fff; padding:1px 7px; border-radius:999px; font-weight:700;}
  .tag{font-size:.6rem; padding:1px 7px; border-radius:999px; font-weight:700;}
  .tag-int{background:rgba(167,139,250,.2); color:#a78bfa;}
  .tag-sdl{background:rgba(79,142,247,.2); color:#4f8ef7;}
  .tag-tut{background:rgba(34,197,94,.2); color:#22c55e;}
  .tag-prac{background:rgba(245,158,11,.2); color:#f59e0b;}
  .item-dept{font-size:.75rem; font-weight:700; display:flex; align-items:center; gap:4px;}
  .item-topic{font-size:.85rem; line-height:1.4;}
  .item-doc{font-size:.73rem; color:var(--muted);}
  .inferred-note{font-size:.64rem; color:var(--amber); font-style:italic; margin-left:4px;}
  .missing{border:1px dashed var(--amber); padding:2px 6px; border-radius:6px; color:var(--amber);}

  .att-btn{
    align-self:flex-start; margin-top:6px; padding:5px 11px; border-radius:999px;
    border:1px solid var(--border); background:transparent; color:var(--muted);
    font-size:.7rem; cursor:pointer;
  }
  .att-btn.done{background:rgba(34,197,94,.15); color:var(--green); border-color:var(--green); font-weight:600;}

  .posting-only{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
    background:var(--bg-elev); border-left:4px solid var(--green); border-radius:9px;
    padding:10px 12px; margin-top:8px;
  }
  .posting-main{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:.83rem;}
  .posting-label{color:var(--green); font-weight:700;}
  .posting-only .item-time{margin-left:4px;}

  .day-note{
    margin-top:8px; padding:8px 10px; background:rgba(245,158,11,.1);
    border:1px dashed var(--amber); border-radius:8px; font-size:.7rem; color:var(--text);
  }

  .exam-card{
    background:rgba(245,158,11,.08); border:1px solid var(--amber); border-radius:14px;
    padding:14px; margin-bottom:10px;
  }
  .exam-inner{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .exam-date{font-size:1rem; font-weight:800;}
  .exam-date span{font-size:.65rem; font-weight:600; color:var(--muted); margin-left:4px;}
  .exam-label{font-weight:700; font-size:.85rem; color:var(--amber);}

  #fab{
    position:fixed; right:16px; bottom:18px; z-index:60; background:var(--accent); color:#fff;
    border:none; border-radius:999px; padding:11px 16px; font-size:.8rem; font-weight:700;
    display:flex; align-items:center; gap:6px; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,.35);
  }
  #fab:active{transform:scale(.96);}

  #modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100;
    align-items:flex-end; justify-content:center;
  }
  #modal-backdrop.show{display:flex;}
  #modal-sheet{
    background:var(--bg-elev); width:100%; max-width:480px; max-height:82vh; overflow-y:auto;
    border-radius:18px 18px 0 0; padding:16px 16px 22px;
  }
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .modal-head h2{font-size:1rem; margin:0;}
  #modal-close{background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; padding:4px;}
  #modal-overall-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding:10px 12px; background:var(--card); border-radius:10px; border:1px solid var(--border);}
  #modal-overall-row span:first-child{font-size:.8rem; color:var(--muted);}
  #modal-overall{font-weight:800; font-size:.95rem;}
  .stat-row{margin-bottom:12px;}
  .stat-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .stat-name{display:flex; align-items:center; gap:5px; font-size:.82rem; font-weight:700;}
  .stat-nums{font-size:.72rem; color:var(--muted);}
  .stat-bar-track{background:var(--border); height:6px; border-radius:999px; overflow:hidden;}
  .stat-bar-fill{height:100%; border-radius:999px;}

  #toast{
    position:fixed; left:50%; bottom:84px; transform:translateX(-50%);
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:8px 14px; border-radius:999px; font-size:.75rem; opacity:0; pointer-events:none;
    transition:opacity .2s; z-index:70;
  }
  #toast.show{opacity:1;}

  @media (min-width:640px){
    main{max-width:640px; margin:0 auto;}
    header .header-top, header .month-tabs, #banner, .batch-row{max-width:640px; margin-left:auto; margin-right:auto;}
  }
</style>
</head>

/* Order in which month tabs appear */
const MONTH_ORDER = ["june2026", "jul2026"];

</script>
<script>
/* ===================== App ===================== */
/* ===================== State ===================== */
var THEME_KEY = "theme_pref";
var ACTIVE_MONTH_KEY = "activeMonthKey";

var currentMonthKey = MONTH_ORDER[MONTH_ORDER.length - 1];
var attendance = {};
var currentBatch = "A";

function currentMonth() { return MONTHS[currentMonthKey]; }

/* Legacy-aware storage keys, so existing data already saved in a browser
   under the older single-month app carries over automatically. */
function attKeyFor(monthKey) { return "attendance_" + monthKey; }
function batchKeyFor(monthKey) {
  if (monthKey === "june2026") return "user_batch_june2026"; // legacy key
  return "batch_" + monthKey;
}

function loadActiveMonth() {
  try {
    var saved = localStorage.getItem(ACTIVE_MONTH_KEY);
    if (saved && MONTHS[saved]) currentMonthKey = saved;
  } catch (e) {}
}
function saveActiveMonth() {
  try { localStorage.setItem(ACTIVE_MONTH_KEY, currentMonthKey); } catch (e) {}
}

function loadAttendance() {
  try {
    var raw = localStorage.getItem(attKeyFor(currentMonthKey));
    attendance = raw ? JSON.parse(raw) : {};
  } catch (e) { attendance = {}; }
}
function saveAttendance() {
  try { localStorage.setItem(attKeyFor(currentMonthKey), JSON.stringify(attendance)); } catch (e) {}
}

function loadBatch() {
  try {
    var b = localStorage.getItem(batchKeyFor(currentMonthKey));
    currentBatch = b || currentBatch || "A";
  } catch (e) { currentBatch = currentBatch || "A"; }
}
function saveBatch() {
  try { localStorage.setItem(batchKeyFor(currentMonthKey), currentBatch); } catch (e) {}
}

/* ===================== Helpers ===================== */
function subjectColor(dept) {
  return SUBJECT_COLORS[dept] || DEFAULT_SUBJECT_COLOR;
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function dotSpan(dept) {
  return '<span class="dot" style="background:' + subjectColor(dept) + '"></span>';
}

function typeTag(type) {
  if (!type) return "";
  return '<span class="tag tag-' + type.toLowerCase() + '">' + type + '</span>';
}

/* Build a list of every trackable item for a given day, respecting the
   currently-selected batch. Each item: {id, dept, topic, doc, t, type, kind} */
function itemsForDay(day) {
  var items = [];
  var idx = 0;
  (day.lectures || []).forEach(function (l) {
    items.push({
      id: "d" + day.d + "_L" + idx,
      dept: l.dept, topic: l.topic, doc: l.doc, t: l.t,
      type: l.type || "", kind: "item", uncertainSlot: !!l.uncertainSlot
    });
    idx++;
  });
  if (day.integration) {
    items.push({
      id: "d" + day.d + "_INT",
      dept: day.integration.dept, topic: day.integration.topic, doc: day.integration.doc,
      t: day.integration.t, type: day.integration.type || "INT", kind: "item"
    });
  }
  if (day.sdl) {
    items.push({
      id: "d" + day.d + "_SDL",
      dept: day.sdl.dept, topic: day.sdl.topic, doc: day.sdl.doc,
      t: day.sdl.t, type: day.sdl.type || "SDL", kind: "item"
    });
  }
  if (day.posting) {
    items.push({
      id: "d" + day.d + "_POST",
      dept: "", topic: day.posting.label, doc: "", t: day.posting.t,
      type: "", kind: "posting"
    });
  }
  if (day.batch && day.batch[currentBatch]) {
    var b = day.batch[currentBatch];
    items.push({
      id: "d" + day.d + "_B" + currentBatch,
      dept: b.dept, topic: b.topic, doc: b.doc, t: "2–4 PM",
      type: b.type || "PRAC", kind: "batch", batchLetter: currentBatch, inferred: !!b.inferred
    });
  }
  return items;
}

/* All subjects touched on a day (for the mini pill row), for current batch */
function subjectsForDay(day) {
  var set = {};
  itemsForDay(day).forEach(function (it) {
    if (it.dept) set[it.dept] = true;
  });
  return Object.keys(set);
}

/* ===================== Rendering ===================== */
function renderLegend() {
  var html = SUBJECT_ORDER.map(function (s) {
    return '<span class="legend-item">' + dotSpan(s) + '<span>' + s + '</span></span>';
  }).join("");
  document.getElementById("legend").innerHTML = html;
}

function renderBanner() {
  var m = currentMonth();
  var notes = m.banner || [];
  if (!notes.length) {
    document.getElementById("banner").innerHTML = "";
    return;
  }
  var items = notes.map(function (n) { return "<li>" + n + "</li>"; }).join("");
  document.getElementById("banner").innerHTML =
    '<strong>⚠️ A few notes on this month\'s data</strong><ul>' + items + '</ul>';
}

function renderMonthTabs() {
  var html = MONTH_ORDER.map(function (key) {
    var m = MONTHS[key];
    var active = key === currentMonthKey ? " active" : "";
    return '<button class="month-tab' + active + '" data-month="' + key + '">' + m.tabLabel + '</button>';
  }).join("");
  document.getElementById("month-tabs").innerHTML = html;
}

function itemButtonHtml(id) {
  var done = !!attendance[id];
  return '<button class="att-btn ' + (done ? "done" : "") + '" data-id="' + id + '">' +
    (done ? "✓ Attended" : "○ Mark attended") + '</button>';
}

function renderItemHtml(it) {
  if (it.kind === "posting") {
    return '<div class="posting-only">' +
      '<div class="posting-main">🏥 <span class="posting-label">' + escapeHtml(it.topic) + '</span>' +
      '<span class="item-time">' + escapeHtml(it.t) + '</span></div>' +
      itemButtonHtml(it.id) +
      '</div>';
  }
  var cls = "item";
  if (it.kind === "batch") cls = "batch-block batch-" + it.batchLetter.toLowerCase();
  var badge = it.kind === "batch" ? '<span class="batch-chip">Batch ' + it.batchLetter + '</span>' : "";
  var inferredNote = it.inferred ? '<span class="inferred-note">(batch inferred — see notes)</span>' : "";
  var uncertainNote = it.uncertainSlot ? '<span class="inferred-note">(time slot approximate)</span>' : "";
  return '<div class="' + cls + '" style="border-left-color:' + subjectColor(it.dept) + '">' +
    '<div class="item-top">' +
      '<span class="item-time">' + escapeHtml(it.t) + '</span>' +
      badge +
      typeTag(it.type) +
    '</div>' +
    '<div class="item-dept" style="color:' + subjectColor(it.dept) + '">' + dotSpan(it.dept) + escapeHtml(it.dept) + '</div>' +
    '<div class="item-topic">' + escapeHtml(it.topic) + inferredNote + uncertainNote + '</div>' +
    (it.doc ? '<div class="item-doc">' + escapeHtml(it.doc) + '</div>' : '') +
    itemButtonHtml(it.id) +
    '</div>';
}

function examCardHtml(day) {
  return '<div class="day-card exam-card" id="day-' + day.d + '">' +
    '<div class="exam-inner">' +
      '<div class="exam-date">' + day.d + ' <span>' + day.day.slice(0, 3) + '</span></div>' +
      '<div class="exam-label">📋 ' + escapeHtml(day.exam) + '</div>' +
    '</div>' +
  '</div>';
}

function dayCardHtml(day) {
  if (day.exam) return examCardHtml(day);

  var items = itemsForDay(day);
  var attendedCount = items.filter(function (it) { return attendance[it.id]; }).length;
  var subjects = subjectsForDay(day);
  var pills = subjects.map(function (s) {
    return '<span class="pill">' + dotSpan(s) + s + '</span>';
  }).join("");

  var bodyHtml = items.map(renderItemHtml).join("");
  if (day.specialNote) {
    bodyHtml += '<div class="day-note">⚠️ ' + escapeHtml(day.specialNote) + '</div>';
  }

  return '<div class="day-card" id="day-' + day.d + '" data-day="' + day.d + '">' +
    '<div class="day-header" data-toggle="' + day.d + '">' +
      '<div class="day-date">' +
        '<span class="day-num">' + day.d + '</span>' +
        '<span class="day-meta"><span class="day-name">' + day.day + '</span><span class="day-month">' + currentMonth().shortLabel + '</span></span>' +
      '</div>' +
      '<div class="day-pills">' + pills + '</div>' +
      '<div class="day-right">' +
        '<span class="day-progress">' + attendedCount + '/' + items.length + '</span>' +
        '<span class="chevron">▾</span>' +
      '</div>' +
    '</div>' +
    '<div class="day-body" id="body-' + day.d + '">' + bodyHtml + '</div>' +
  '</div>';
}

function renderDays() {
  var html = currentMonth().schedule.map(dayCardHtml).join("");
  document.getElementById("days").innerHTML = html;
}

function updateDaySummary(dayNum) {
  var day = currentMonth().schedule.filter(function (d) { return d.d === dayNum; })[0];
  if (!day || day.exam) return;
  var items = itemsForDay(day);
  var attendedCount = items.filter(function (it) { return attendance[it.id]; }).length;
  var el = document.querySelector('#day-' + dayNum + ' .day-progress');
  if (el) el.textContent = attendedCount + "/" + items.length;
}

/* ===================== Subject-wise stats ===================== */
function computeStats() {
  var stats = {}; // dept -> {attended, total}
  var overallTotal = 0, overallAttended = 0;
  currentMonth().schedule.forEach(function (day) {
    if (day.exam) return;
    itemsForDay(day).forEach(function (it) {
      if (it.kind === "posting") return; // don't count clinical posting toward subject stats
      if (!it.dept) return;
      if (!stats[it.dept]) stats[it.dept] = { attended: 0, total: 0 };
      stats[it.dept].total++;
      overallTotal++;
      if (attendance[it.id]) { stats[it.dept].attended++; overallAttended++; }
    });
  });
  return { stats: stats, overallTotal: overallTotal, overallAttended: overallAttended };
}

function renderFab() {
  var s = computeStats();
  document.getElementById("fab-badge").textContent = s.overallAttended + "/" + s.overallTotal;
}

function renderModal() {
  var s = computeStats();
  var rows = SUBJECT_ORDER.filter(function (k) { return s.stats[k]; }).map(function (k) {
    var v = s.stats[k];
    var pct = v.total ? Math.round((v.attended / v.total) * 100) : 0;
    return '<div class="stat-row">' +
      '<div class="stat-top">' +
        '<span class="stat-name">' + dotSpan(k) + k + '</span>' +
        '<span class="stat-nums">' + v.attended + '/' + v.total + ' · ' + pct + '%</span>' +
      '</div>' +
      '<div class="stat-bar-track"><div class="stat-bar-fill" style="width:' + pct + '%;background:' + subjectColor(k) + '"></div></div>' +
    '</div>';
  }).join("");

  var overallPct = s.overallTotal ? Math.round((s.overallAttended / s.overallTotal) * 100) : 0;
  document.getElementById("modal-overall-label").textContent = "Overall — " + currentMonth().label;
  document.getElementById("modal-overall").textContent = s.overallAttended + "/" + s.overallTotal + " · " + overallPct + "%";
  document.getElementById("modal-rows").innerHTML = rows;
}

/* ===================== Batch selector ===================== */
function setBatch(letter) {
  currentBatch = letter;
  saveBatch();
  document.querySelectorAll(".batch-btn").forEach(function (b) {
    b.classList.toggle("active", b.dataset.batch === letter);
  });
  document.querySelectorAll(".batch-btn-modal").forEach(function (b) {
    b.classList.toggle("active", b.dataset.batch === letter);
  });
  renderDays();
  renderFab();
  renderModal();
}

/* ===================== Month switching ===================== */
function setMonth(monthKey) {
  if (!MONTHS[monthKey] || monthKey === currentMonthKey) {
    if (MONTHS[monthKey]) return; // already active, nothing to do
  }
  currentMonthKey = monthKey;
  saveActiveMonth();
  loadAttendance();
  loadBatch();

  document.getElementById("page-title").textContent = currentMonth().label + " Teaching Schedule";
  renderMonthTabs();
  renderBanner();
  renderDays();
  renderFab();
  renderModal();

  document.querySelectorAll(".batch-btn").forEach(function (b) {
    b.classList.toggle("active", b.dataset.batch === currentBatch);
  });
  document.querySelectorAll(".batch-btn-modal").forEach(function (b) {
    b.classList.toggle("active", b.dataset.batch === currentBatch);
  });

  highlightTodayCard();
}

/* ===================== Theme ===================== */
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("theme-toggle").textContent = theme === "light" ? "🌙" : "☀️";
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
}

function toggleTheme() {
  var cur = document.documentElement.getAttribute("data-theme") || "dark";
  applyTheme(cur === "dark" ? "light" : "dark");
}

/* ===================== Today ===================== */
function monthKeyForRealToday() {
  var now = new Date();
  var y = now.getFullYear(), m0 = now.getMonth();
  for (var i = 0; i < MONTH_ORDER.length; i++) {
    var mm = MONTHS[MONTH_ORDER[i]];
    if (mm.year === y && mm.month0 === m0) return MONTH_ORDER[i];
  }
  return null;
}

function jumpToToday() {
  var todayKey = monthKeyForRealToday();
  if (!todayKey) {
    var toast = document.getElementById("toast");
    toast.textContent = "Today isn't in this schedule yet";
    toast.classList.add("show");
    setTimeout(function () { toast.classList.remove("show"); }, 2200);
    return;
  }
  if (todayKey !== currentMonthKey) setMonth(todayKey);

  var now = new Date();
  var d = now.getDate();
  var card = document.getElementById("day-" + d);
  if (!card) return;
  var body = document.getElementById("body-" + d);
  if (body && !body.classList.contains("open")) {
    body.classList.add("open");
    card.querySelector(".day-header").classList.add("expanded");
  }
  card.classList.add("today-flash");
  if (typeof card.scrollIntoView === "function") {
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  setTimeout(function () { card.classList.remove("today-flash"); }, 2000);
}

function highlightTodayCard() {
  document.querySelectorAll(".day-card.is-today").forEach(function (c) { c.classList.remove("is-today"); });
  var todayKey = monthKeyForRealToday();
  if (todayKey !== currentMonthKey) return;
  var now = new Date();
  var card = document.getElementById("day-" + now.getDate());
  if (card) card.classList.add("is-today");
}

/* ===================== Events ===================== */
function attachEvents() {
  document.getElementById("days").addEventListener("click", function (e) {
    var btn = e.target.closest(".att-btn");
    if (btn) {
      var id = btn.dataset.id;
      attendance[id] = !attendance[id];
      saveAttendance();
      btn.classList.toggle("done", attendance[id]);
      btn.textContent = attendance[id] ? "✓ Attended" : "○ Mark attended";
      var dayNum = parseInt(id.split("_")[0].replace("d", ""), 10);
      updateDaySummary(dayNum);
      renderFab();
      renderModal();
      return;
    }
    var header = e.target.closest(".day-header");
    if (header) {
      var dnum = header.dataset.toggle;
      var body = document.getElementById("body-" + dnum);
      body.classList.toggle("open");
      header.classList.toggle("expanded");
    }
  });

  document.getElementById("month-tabs").addEventListener("click", function (e) {
    var btn = e.target.closest(".month-tab");
    if (btn) setMonth(btn.dataset.month);
  });

  document.querySelectorAll(".batch-btn").forEach(function (b) {
    b.addEventListener("click", function () { setBatch(b.dataset.batch); });
  });
  document.querySelectorAll(".batch-btn-modal").forEach(function (b) {
    b.addEventListener("click", function () { setBatch(b.dataset.batch); });
  });

  document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
  document.getElementById("today-btn").addEventListener("click", jumpToToday);

  document.getElementById("fab").addEventListener("click", function () {
    document.getElementById("modal-backdrop").classList.add("show");
    renderModal();
  });
  document.getElementById("modal-close").addEventListener("click", function () {
    document.getElementById("modal-backdrop").classList.remove("show");
  });
  document.getElementById("modal-backdrop").addEventListener("click", function (e) {
    if (e.target.id === "modal-backdrop") {
      document.getElementById("modal-backdrop").classList.remove("show");
    }
  });
}

/* ===================== Init ===================== */
function init() {
  loadActiveMonth();
  // Default to whichever month is "today" if we have one and nothing saved yet.
  try {
    if (!localStorage.getItem(ACTIVE_MONTH_KEY)) {
      var todayKey = monthKeyForRealToday();
      if (todayKey) currentMonthKey = todayKey;
    }
  } catch (e) {}

  loadAttendance();
  loadBatch();

  var savedTheme = "dark";
  try { savedTheme = localStorage.getItem(THEME_KEY) || "dark"; } catch (e) {}
  applyTheme(savedTheme);

  document.getElementById("page-title").textContent = currentMonth().label + " Teaching Schedule";
  renderMonthTabs();
  renderLegend();
  renderBanner();
  renderDays();
  renderFab();
  attachEvents();

  document.querySelectorAll(".batch-btn").forEach(function (b) {
    b.classList.toggle("active", b.dataset.batch === currentBatch);
  });
  document.querySelectorAll(".batch-btn-modal").forEach(function (b) {
    b.classList.toggle("active", b.dataset.batch === currentBatch);
  });

  highlightTodayCard();
}

document.addEventListener("DOMContentLoaded", init);

</script>
</body>
</html>
